# Smithery MCP 市场配置文件
# 文档: https://smithery.ai/docs

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - openaiApiKey
    properties:
      openaiApiKey:
        type: string
        description: "OpenAI / DeepSeek / 通义千问 API Key"
      openaiBaseUrl:
        type: string
        description: "自定义 API Base URL（可选）"
        default: ""
      openaiModel:
        type: string
        description: "模型名称（可选，默认 gpt-4o-mini）"
        default: "gpt-4o-mini"
  commandFunction: |
    # 生成启动命令
    cmd = "python mcp_server.py"
    env = {
      "OPENAI_API_KEY": config.get("openaiApiKey"),
      "OPENAI_BASE_URL": config.get("openaiBaseUrl", ""),
      "OPENAI_MODEL": config.get("openaiModel", "gpt-4o-mini"),
    }
    return {"command": cmd, "env": env}
